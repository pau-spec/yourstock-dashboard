// ── TWSE 股價 ─────────────────────────────────────────
async function fetchTWSEPrices(ids){
  const prices={},errors=[];
  try{
    const r=await fetch("https://openapi.twse.com.tw/v1/exchangeReport/BWIBBU_ALL",{headers:{Accept:"application/json"}});
    if(r.ok){const d=await r.json();for(const item of d){const code=item["證券代號"]?.trim();if(code&&ids.includes(code)){const cp=safeNum(item["收盤價"]||"0");if(cp>0)prices[code]={price:cp,yield:safeNum(item["殖利率"]),per:safeNum(item["本益比"]),pbr:safeNum(item["股價淨值比"]),source:"TWSE"};}}}
  }catch(e){errors.push(e.message);}
  const m1=ids.filter(id=>!prices[id]);
  if(m1.length){try{const r=await fetch("https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL",{headers:{Accept:"application/json"}});if(r.ok){const d=await r.json();for(const item of d){const code=item["證券代號"]?.trim();if(code&&m1.includes(code)){const cp=safeNum(item["收盤價"]||"0");if(cp>0)prices[code]={price:cp,source:"TWSE_DAY"};}}}}catch(e){errors.push(e.message);}}
  const m2=ids.filter(id=>!prices[id]);
  if(m2.length){try{const r=await fetch("https://www.tpex.org.tw/openapi/v1/tpex_mainboard_daily_close_quotes",{headers:{Accept:"application/json"}});if(r.ok){const d=await r.json();for(const item of d){const code=(item["SecuritiesCompanyCode"]||item["代號"]||"").trim();if(code&&m2.includes(code)){const cp=safeNum(item["Close"]||item["收盤"]||"0");if(cp>0)prices[code]={price:cp,source:"TPEx"};}}}}catch(e){errors.push(e.message);}}
  return{prices,errors,fetchTime:new Date().toLocaleTimeString("zh-TW")};
}

// ── 解析資料 ──────────────────────────────────────────
const KNOWN=["0056","00919","00878","00900","2812","2887","2891","2884","2883","2801","0050","2330","3231","1301","2002","00679B","00942B","00950B","00939","00940","2324","009816","00891","00924","00927","4114"];
const DIV_IDS=new Set(["00679B","00942B","00950B","0056","00919","00878","00900","2812","2887","2891","2884","2883","2801","4114","00939","00940"]);

function parseData(sheetMap, sheetNames){
  const getRows=name=>sheetMap[name]||[];
  const allStocks=[];
  for(const sid of KNOWN){
    if(!sheetNames.includes(sid))continue;
    const rows=getRows(sid);
    if(!rows||rows.length<3)continue;
    const h0=rows[1]||[], h1=rows[2]||[];
    const price=safeNum(h1[0]),shares=safeNum(h1[1]),value=safeNum(h1[2]);
    const pnlBook=safeNum(h1[3]),cost=safeNum(h1[4]),divAccum=safeNum(h1[5]);
    const retWithDiv=safeNum(h1[8]);
    const yearDiv={};
    for(let ci=13;ci<h0.length;ci++){const yr=parseInt(h0[ci]);if(yr>=2018&&yr<=2030)yearDiv[yr]=safeNum(h1[ci]);}
    allStocks.push({id:sid,name:sid,shares,price,cost,value:value||shares*price,pnl:pnlBook,ret:retWithDiv,divAccum,yearDiv,type:DIV_IDS.has(sid)?"dividend":"capital",strategy:""});
  }
  if(sheetNames.includes("總表")){
    for(const row of getRows("總表")){
      if(!row||!row[0])continue;
      const id=String(row[0]).trim();
      const s=allStocks.find(x=>x.id===id);
      if(s){s.name=String(row[1]||s.name).trim();s.strategy=String(row[19]||"").trim();if(!s.cost)s.cost=safeNum(row[3]);if(!s.pnl)s.pnl=safeNum(row[11]);if(!s.ret)s.ret=safeNum(row[14]);}
    }
  }
  const yearly=[];
  if(sheetNames.includes("總績效表")){
    const rows=getRows("總績效表");
    for(let i=1;i<rows.length;i++){
      const row=rows[i];if(!row||!row[0])continue;
      const yr=parseInt(String(row[0]));if(isNaN(yr)||yr<2010)continue;
      yearly.push({year:yr,cumCost:safeNum(row[1])*10000,asset:safeNum(row[2])*10000,div:safeNum(row[3])*10000,roa:safeNum(row[4]),cashYield:safeNum(row[6]),note:String(row[14]||"").trim()});
    }
  }
  const txnDiv={};
  for(const sid of KNOWN){
    const rows=getRows(sid);
    for(let i=4;i<rows.length;i++){
      const row=rows[i];
      if(!row||!String(row[1]||"").includes("現金股利"))continue;
      const amt=safeNum(row[6]);if(!amt)continue;
      const dv=row[0];let yr=null;
      if(typeof dv==="number"&&dv>40000){yr=new Date(Math.round((dv-25569)*86400*1000)).getFullYear();}
      else{yr=parseInt(String(dv||"").slice(0,4));}
      if(yr&&yr>=2017&&yr<=2030)txnDiv[yr]=(txnDiv[yr]||0)+amt;
    }
  }
  const ySet=new Set(yearly.map(y=>y.year));
  for(const[yr,div]of Object.entries(txnDiv)){
    const y=parseInt(yr);
    if(!ySet.has(y))yearly.push({year:y,cumCost:0,asset:0,div,roa:null,cashYield:null,note:""});
    else{const f=yearly.find(r=>r.year===y);if(f&&!f.div)f.div=div;}
  }
  yearly.sort((a,b)=>a.year-b.year);
  const retirement=[];
  if(sheetNames.includes("總績效表")){
    const rows=getRows("總績效表");
    for(let i=1;i<rows.length;i++){
      const row=rows[i];if(!row||!row[0])continue;
      const yr=parseInt(String(row[0]));if(isNaN(yr))continue;
      const pension=safeNum(row[11]),laborRet=safeNum(row[12]),monthly=safeNum(row[13]);
      if(pension>0||laborRet>0){const m=String(row[0]).match(/(\d+)歲/);retirement.push({year:yr,age:m?parseInt(m[1]):yr-1986,pension,laborRet,monthly});}
    }
  }
  return{allStocks,yearly,retirement,totalInvested:allStocks.reduce((s,x)=>s+x.cost,0),totalValue:allStocks.reduce((s,x)=>s+x.value,0),totalDivAccum:allStocks.reduce((s,x)=>s+x.divAccum,0)};
}

function parseExcel(wb){
  const m={};
  for(const n of wb.SheetNames)m[n]=XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1,defval:null});
  return parseData(m,wb.SheetNames);
}

// ── Google OAuth ──────────────────────────────────────
function waitForGIS(){
  return new Promise((resolve,reject)=>{
    // Already loaded
    if(window.google?.accounts?.oauth2){resolve();return;}
    // Inject script if not present
    if(!document.querySelector('script[src*="accounts.google.com/gsi"]')){
      const s=document.createElement("script");
      s.src="https://accounts.google.com/gsi/client";
      s.onload=()=>{
        let tries=0;
        const t=setInterval(()=>{
          tries++;
          if(window.google?.accounts?.oauth2){clearInterval(t);resolve();}
          else if(tries>50){clearInterval(t);reject(new Error("Google 登入初始化失敗，請重新整理頁面"));}
        },100);
      };
      s.onerror=()=>reject(new Error("無法載入 Google 登入腳本，請確認網路連線"));
      document.head.appendChild(s);
      return;
    }
    // Script exists, wait for google object
    let tries=0;
    const t=setInterval(()=>{
      tries++;
      if(window.google?.accounts?.oauth2){clearInterval(t);resolve();}
      else if(tries>100){clearInterval(t);reject(new Error("Google 登入服務載入逾時，請重新整理頁面"));}
    },100);
  });
}

async function signInGoogle(){
  await waitForGIS();
  return new Promise((resolve,reject)=>{
    const client=window.google.accounts.oauth2.initTokenClient({
      client_id:GOOGLE_CLIENT_ID,
      scope:SHEETS_SCOPE,
      callback:(resp)=>{if(resp.error)reject(new Error(resp.error_description||resp.error));else resolve(resp.access_token);},
    });
    client.requestAccessToken({prompt:"consent"});
  });
}

async function fetchSheetNames(id,token){
  const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}?fields=sheets.properties.title`,{headers:{Authorization:`Bearer ${token}`}});
  if(!r.ok)throw new Error("無法讀取試算表，請確認權限 ("+r.status+")");
  const d=await r.json();
  return(d.sheets||[]).map(s=>s.properties.title);
}

async function fetchSheetData(id,token,name){
  const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(name+"!A1:Z300")}`,{headers:{Authorization:`Bearer ${token}`}});
  if(!r.ok)throw new Error("讀取工作表失敗 ("+r.status+")");
  return(await r.json()).values||[];
}

async function fetchDriveSheets(token){
  const r=await fetch("https://www.googleapis.com/drive/v3/files?q=mimeType%3D'application%2Fvnd.google-apps.spreadsheet'&fields=files(id,name,modifiedTime)&orderBy=modifiedTime+desc&pageSize=20",{headers:{Authorization:`Bearer ${token}`}});
  if(!r.ok)throw new Error("讀取 Drive 失敗");
  return(await r.json()).files||[];
}

async function loadSheet(sheetId){
  const token=STATE.accessToken;
  setState({gsLoading:true,error:""});
  try{
    const names=await fetchSheetNames(sheetId,token);
    const m={};
    for(const n of names)m[n]=await fetchSheetData(sheetId,token,n);
    const parsed=parseData(m,names);
    setState({data:parsed,source:"gsheet",gsLoading:false,showPicker:false,tab:"overview"});
  }catch(e){
    if(e.message.includes("401")){setState({gsLoading:false,error:"授權已過期，請重新登入",accessToken:null,gsUser:null});}
    else setState({gsLoading:false,error:e.message});
  }
}

// ── HTML 工具 ─────────────────────────────────────────
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==="style"&&typeof v==="object"){Object.assign(el.style,v);}
    else if(k.startsWith("on")&&typeof v==="function"){el.addEventListener(k.slice(2).toLowerCase(),v);}
    else el.setAttribute(k,v);
  }
  for(const c of children){
    if(c==null||c===false)continue;
    el.appendChild(typeof c==="string"?document.createTextNode(c):c);
  }
  return el;
}
function div(style,...children){return h("div",{style},...children);}
function btn(style,onclick,...children){return h("button",{style,onClick:onclick},...children);}
function span(style,...children){return h("span",{style},...children);}

// ── 處理 Excel 檔案 ───────────────────────────────────
function processFile(file){
  if(!file.name.match(/\.(xlsx|xls)$/i)){setState({error:"請上傳 .xlsx 或 .xls 格式"});return;}
  setState({loadingFile:true,error:""});
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:"array",cellDates:false});
      setState({data:parseExcel(wb),source:"excel",loadingFile:false,tab:"overview"});
    }catch(err){setState({loadingFile:false,error:"解析失敗："+err.message});}
  };
  reader.onerror=()=>setState({loadingFile:false,error:"讀取失敗"});
  reader.readAsArrayBuffer(file);
}

      card.appendChild(top);
      const row=div({display:"flex",gap:"8px",marginBottom:"8px"});
      const p1=div({background:C.bg,borderRadius:"8px",padding:"5px 10px",flex:"1"});p1.appendChild(div({fontSize:"10px",color:C.hint},"勞保月領"));p1.appendChild(div({fontSize:"12px",fontWeight:"600",color:C.blue},fmt(r.pension)+" 元"));row.appendChild(p1);
      const p2=div({background:C.bg,borderRadius:"8px",padding:"5px 10px",flex:"1"});p2.appendChild(div({fontSize:"10px",color:C.hint},"勞退月領"));p2.appendChild(div({fontSize:"12px",fontWeight:"600",color:C.blue},fmt(r.laborRet)+" 元"));row.appendChild(p2);
      card.appendChild(row);
      const bar=div({height:"6px",background:C.border,borderRadius:"3px",overflow:"hidden"});
      bar.appendChild(div({height:"100%",borderRadius:"3px",background:C.accent,width:Math.min(100,(r.monthly/5)*100)+"%"}));
      card.appendChild(bar);
      card.appendChild(div({fontSize:"10px",color:C.hint,marginTop:"3px"},"目標 5萬/月 達成率 "+Math.round((r.monthly/5)*100)+"%"));
      content.appendChild(card);
    });
  }

  wrap.appendChild(content);

  // 底部 Tab
  const bottomTab=div({position:"fixed",bottom:"0",left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"480px",background:"#fff",borderTop:`1px solid ${C.border}`,display:"flex",zIndex:"100"});
  [["overview","📊","總覽"],["stocks","📈","持股"],["history","📅","年度"],["retire","🏖️","退休"]].forEach(([id,icon,label])=>{
    bottomTab.appendChild(btn({flex:"1",border:"none",background:"transparent",color:tab===id?C.accent:C.hint,padding:"7px 4px",fontSize:"10px",fontWeight:tab===id?"600":"400"},
      ()=>setState({tab:id}),div({fontSize:"18px"},icon),div({},label)
    ));
  });
  wrap.appendChild(bottomTab);

  return wrap;
}

// ── 啟動 ──────────────────────────────────────────────
render();
</script>
